<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

<!-- הגדרות "אפליקציה" לאייפון: מסך מלא בלי סרגלי ספארי -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="רישום שעות">
<meta name="theme-color" content="#2B6777">

<!-- האייקון שיופיע במסך הבית -->
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<link rel="manifest" href="manifest.json">

<title>רישום שעות</title>
<style>
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    background: #F2F2F2;
    overflow: hidden;
  }
  iframe {
    border: none;
    width: 100%;
    height: 100%;
    height: 100dvh;
    display: block;
  }
  .loader {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #F2F2F2;
    transition: opacity .4s;
    z-index: 5;
  }
  .spin {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 4px solid #C8D8E4;
    border-top-color: #2B6777;
    animation: r 0.9s linear infinite;
  }
  @keyframes r { to { transform: rotate(360deg); } }
  .loader.hide { opacity: 0; pointer-events: none; }
</style>
</head>
<body>
  <div class="loader" id="loader"><div class="spin"></div></div>

  <!-- ▼▼▼ הדבק כאן את כתובת האפליקציה שלך (זו שמסתיימת ב-/exec) במקום הטקסט בין המרכאות ▼▼▼ -->
  <iframe id="app" src="https://script.google.com/macros/s/AKfycbzsO8Jew1cR1_j6RjMWw_ScPEI0tDIup8qWlCYs2BO2BPQaL-t8dMNEDE44b6h7ADvO/exec" allow="clipboard-write"></iframe>

  <script>
    document.getElementById('app').addEventListener('load', function () {
      setTimeout(function () {
        document.getElementById('loader').classList.add('hide');
      }, 400);
    });
  </script>
</body>
</html>
