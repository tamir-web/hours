<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

<!-- הגדרות "אפליקציה" לאייפון: מסך מלא בלי סרגלי ספארי -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="רישום שעות">
<meta name="theme-color" content="#2B6777">

<!-- האייקון שיופיע במסך הבית -->
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<link rel="manifest" href="manifest.json">

<title>רישום שעות</title>

<!-- OneSignal - התראות פוש -->
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

<style>
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    background: #F2F2F7;
    overflow: hidden;
  }
  iframe {
    border: none;
    width: 100%;
    height: 100%;
    height: 100dvh;
    display: block;
  }
  .loader {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #F2F2F7;
    transition: opacity .4s;
    z-index: 5;
  }
  .spin {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 4px solid #C8D8E4;
    border-top-color: #2B6777;
    animation: r 0.9s linear infinite;
  }
  @keyframes r { to { transform: rotate(360deg); } }
  .loader.hide { opacity: 0; pointer-events: none; }

  /* כפתור הפעלת התראות - מופיע רק עד שמאשרים */
  #notifBtn {
    position: fixed;
    bottom: calc(18px + env(safe-area-inset-bottom));
    left: 16px;
    display: none;
    align-items: center;
    gap: 7px;
    background: #FFFFFF;
    color: #2B6777;
    border: none;
    font-family: -apple-system, Arial, sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 11px 16px;
    border-radius: 999px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.16);
    cursor: pointer;
    z-index: 8;
  }
</style>
</head>
<body>
  <div class="loader" id="loader"><div class="spin"></div></div>

  <!-- ▼▼▼ הדבק כאן את כתובת האפליקציה שלך (מסתיימת ב-/exec) במקום הטקסט ▼▼▼ -->
  <iframe id="app" src="https://script.google.com/macros/s/AKfycbzsO8Jew1cR1_j6RjMWw_ScPEI0tDIup8qWlCYs2BO2BPQaL-t8dMNEDE44b6h7ADvO/exec"></iframe>

  <button id="notifBtn">🔔 הפעל התראות</button>

  <script>
    document.getElementById('app').addEventListener('load', function () {
      setTimeout(function () {
        document.getElementById('loader').classList.add('hide');
      }, 400);
    });

    // ---- OneSignal: הרשמה להתראות ----
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function (OneSignal) {
      try {
        await OneSignal.init({
          appId: "4c095997-4e16-4020-a2b3-9bc6c970078a",   // ▼ הדבק כאן את ה-App ID מ-OneSignal
          serviceWorkerPath: "/hours/OneSignalSDKWorker.js",
          serviceWorkerParam: { scope: "/hours/" }
        });

        var btn = document.getElementById('notifBtn');
        var refresh = function () {
          var granted = OneSignal.Notifications.permission;   // true אחרי אישור
          btn.style.display = granted ? 'none' : 'flex';
        };
        btn.addEventListener('click', async function () {
          await OneSignal.Notifications.requestPermission();
          refresh();
        });
        OneSignal.Notifications.addEventListener('permissionChange', refresh);
        refresh();
      } catch (e) { /* אם OneSignal לא הוגדר עדיין - האפליקציה עובדת רגיל */ }
    });
  </script>
</body>
</html>
